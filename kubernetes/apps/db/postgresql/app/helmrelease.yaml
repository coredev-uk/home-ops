---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
spec:
  chartRef:
    kind: OCIRepository
    name: postgresql
  interval: 1h
  values:
    architecture: standalone
    auth:
      username: outline
      database: outline
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
    primary:
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 8Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      initdb:
        scripts:
          01-create-app-databases.sh: |
            #!/bin/bash
            set -euo pipefail

            APP_DB_PASSWORD="${POSTGRES_PASSWORD:-${POSTGRESQL_PASSWORD:-}}"
            if [[ -z "${APP_DB_PASSWORD}" ]]; then
              echo "Unable to resolve application database password" >&2
              exit 1
            fi

            psql --username postgres --dbname postgres --set ON_ERROR_STOP=1 --set app_password="${APP_DB_PASSWORD}" <<'EOSQL'
            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'mealie') THEN
                CREATE ROLE mealie LOGIN PASSWORD :'app_password';
              ELSE
                ALTER ROLE mealie WITH LOGIN PASSWORD :'app_password';
              END IF;
            END
            $$;

            SELECT 'CREATE DATABASE mealie OWNER mealie'
            WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'mealie')\gexec

            DO $$
            BEGIN
              IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'pocket_id') THEN
                CREATE ROLE pocket_id LOGIN PASSWORD :'app_password';
              ELSE
                ALTER ROLE pocket_id WITH LOGIN PASSWORD :'app_password';
              END IF;
            END
            $$;

            SELECT 'CREATE DATABASE pocket_id OWNER pocket_id'
            WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'pocket_id')\gexec
            EOSQL
    backup:
      enabled: true
      cronjob:
        schedule: "0 */12 * * *"
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 3
        ttlSecondsAfterFinished: 86400
        command:
          - /bin/sh
          - -ec
          - |
            find "${PGDUMP_DIR}" -type f -name '*.pgdump' -mtime +14 -delete || true
            PGPASSWORD="${PGPASSWORD:-$(< "$PGPASSWORD_FILE")}" pg_dumpall --clean --if-exists --load-via-partition-root --quote-all-identifiers --no-password --file="${PGDUMP_DIR}/pg_dumpall-$(date '+%Y-%m-%d-%H-%M').pgdump"
        storage:
          enabled: true
          storageClass: ceph-block
          size: 3Gi
