---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: atuin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: atuin-secret
    template:
      data:
        ATUIN_DB_URI: "postgres://atuin:{{ .POSTGRES_ATUIN_PASSWORD | urlquery }}@postgresql.db.svc.cluster.local:5432/atuin?sslmode=disable"
  dataFrom:
    - extract:
        key: postgresql
