---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autobrr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: autobrr-secret
    template:
      data:
        AUTOBRR__SESSION_SECRET: "{{ .AUTOBRR_SESSION_SECRET }}"
        AUTOBRR__OIDC_CLIENT_ID: "{{ .AUTOBRR_OIDC_CLIENT_ID }}"
        AUTOBRR__OIDC_CLIENT_SECRET: "{{ .AUTOBRR_OIDC_CLIENT_SECRET }}"
        AUTOBRR__DATABASE_TYPE: postgres
        AUTOBRR__POSTGRES_HOST: postgresql.db.svc.cluster.local
        AUTOBRR__POSTGRES_PORT: "5432"
        AUTOBRR__POSTGRES_DB: autobrr
        AUTOBRR__POSTGRES_USER: autobrr
        AUTOBRR__POSTGRES_PASSWORD: "{{ .POSTGRES_AUTOBRR_PASSWORD }}"
        AUTOBRR__POSTGRES_SSLMODE: disable
  dataFrom:
    - extract:
        key: postgresql
    - extract:
        key: autobrr
