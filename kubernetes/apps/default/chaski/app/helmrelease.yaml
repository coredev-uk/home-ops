# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaski
spec:
  chartRef:
    kind: OCIRepository
    name: chaski
  interval: 1h
  values:
    replicaCount: 2
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    env:
      TZ: Europe/London
    envFrom:
      - secretRef:
          name: chaski-secret
    config:
      targets:
        change-detection:
          apprise:
            url: pover://{{ env "PUSHOVER_USER_KEY" }}@{{ env "CHANGE_DETECTION_PUSHOVER_TOKEN" }}
        radarr:
          apprise:
            url: pover://{{ env "PUSHOVER_USER_KEY" }}@{{ env "RADARR_PUSHOVER_TOKEN" }}
        sonarr:
          apprise:
            url: pover://{{ env "PUSHOVER_USER_KEY" }}@{{ env "SONARR_PUSHOVER_TOKEN" }}
      routes:
        changedetection-pushover:
          target: change-detection
          title: '{{ .payload.title | default (.payload.watch_title | default (.payload.page_title | default (.payload.website_title | default (.payload.url | default (.payload.watch_url | default "changedetection.io"))))) }}'
          message: |-
            {{- $title := .payload.title | default (.payload.watch_title | default (.payload.page_title | default (.payload.website_title | default (.payload.url | default (.payload.watch_url | default "changedetection.io"))))) -}}
            {{- $url := .payload.url | default (.payload.watch_url | default (.payload.source_url | default "https://changes.hera.ac")) -}}
            {{- $added := .payload.diff_added | default .payload.added -}}
            {{- $removed := .payload.diff_removed | default .payload.removed -}}
            {{- $diff := .payload.diff | default (.payload.diff_full | default (.payload.message | default (.payload.body | default .payload.current_snapshot))) -}}
            <b>{{ $title }}</b><br><a href="{{ $url }}">{{ $url }}</a>{{ if $added }}<br><br><b>Added</b><br><pre>{{ $added }}</pre>{{ end }}{{ if $removed }}<br><br><b>Removed</b><br><pre>{{ $removed }}</pre>{{ end }}{{ if and (not $added) (not $removed) $diff }}<br><br><b>Change</b><br><pre>{{ $diff }}</pre>{{ end }}
          params:
            priority: normal
            url: '{{ .payload.url | default (.payload.watch_url | default (.payload.source_url | default "https://changes.hera.ac")) }}'
            url_title: View Watch
            format: html
        radarr-download:
          target: radarr
          title: Movie {{ if .payload.isUpgrade }}Upgraded{{ else }}Added{{ end }}
          message: |-
            <b>{{ .payload.movie.title }} ({{ .payload.movie.year }})</b>
            <small>{{ .payload.movie.overview | ellipsis 300 }}</small>
            <small><b>Client:</b> {{ .payload.downloadClient | default "unknown" }}</small>
          params:
            format: html
            priority: low
            url: "{{ .payload.applicationUrl }}/movie/{{ .payload.movie.tmdbId }}"
            url_title: View Movie
          whenExpr: payload.eventType == "Download"
        radarr-manual:
          target: radarr
          title: Movie Requires Manual Interaction
          message: |-
            <b>{{ .payload.movie.title }} ({{ .payload.movie.year }})</b>
            <small><b>Client:</b> {{ .payload.downloadClient | default "unknown" }}</small>
          params:
            format: html
            priority: high
            url: "{{ .payload.applicationUrl }}/activity/queue"
            url_title: View Queue
          whenExpr: payload.eventType == "ManualInteractionRequired"
        sonarr-download:
          target: sonarr
          title: Episode {{ if .payload.isUpgrade }}Upgraded{{ else }}Added{{ end }}
          message: |-
            <b>{{ .payload.series.title }} ({{ printf "S%02dE%02d" (toInt (index .payload.episodes 0).seasonNumber) (toInt (index .payload.episodes 0).episodeNumber) }})</b>
            <small>{{ (index .payload.episodes 0).title }}</small>
            <small><b>Client:</b> {{ .payload.downloadClient | default "unknown" }}</small>
          params:
            format: html
            priority: low
            url: "{{ .payload.applicationUrl }}/series/{{ .payload.series.titleSlug }}"
            url_title: View Series
          whenExpr: payload.eventType == "Download"
        sonarr-manual:
          target: sonarr
          title: Episode Requires Manual Interaction
          message: |-
            <b>{{ .payload.series.title }}</b>
            <small><b>Client:</b> {{ .payload.downloadClient | default "unknown" }}</small>
          params:
            format: html
            priority: high
            url: "{{ .payload.applicationUrl }}/activity/queue"
            url_title: View Queue
          whenExpr: payload.eventType == "ManualInteractionRequired"
    monitoring:
      serviceMonitor:
        enabled: true
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
