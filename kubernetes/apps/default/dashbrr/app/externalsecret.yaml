---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dashbrr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: dashbrr-secret
    template:
      data:
        DASHBRR__LISTEN_ADDR: 0.0.0.0:80
        DASHBRR__DB_TYPE: postgres
        DASHBRR__DB_HOST: postgresql.db.svc.cluster.local
        DASHBRR__DB_PORT: "5432"
        DASHBRR__DB_USER: dashbrr
        DASHBRR__DB_PASSWORD: "{{ .POSTGRES_DASHBRR_PASSWORD }}"
        DASHBRR__DB_NAME: dashbrr
        DASHBRR__DB_PATH: /data/dashbrr.db
        OIDC_ISSUER: https://id.hera.ac
        OIDC_CLIENT_ID: "{{ .AUTOBRR_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .AUTOBRR_OIDC_CLIENT_SECRET }}"
        OIDC_REDIRECT_URL: https://dash.hera.ac/api/auth/oidc/callback
  dataFrom:
    - extract:
        key: postgresql
    - extract:
        key: autobrr
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dashbrr-services
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: dashbrr-services
    template:
      data:
        services.yaml: |
          services:
            autobrr:
              - url: http://autobrr.default.svc.cluster.local
                access_url: https://autobrr.hera.ac
                apikey: "{{ .AUTOBRR_DASHBRR_API_KEY }}"
                name: Autobrr
            bazarr:
              - url: http://bazarr.default.svc.cluster.local
                access_url: https://bazarr.hera.ac
                apikey: "{{ .BAZARR_API_KEY }}"
                name: Bazarr
            jellyfin:
              - url: http://jellyfin.default.svc.cluster.local:8096
                access_url: https://jellyfin.hera.ac
                apikey: "{{ .JELLYFIN_API_TOKEN }}"
                name: Jellyfin
            overseerr:
              - url: http://seerr.default.svc.cluster.local
                access_url: https://requests.hera.ac
                apikey: "{{ .SEERR_API_KEY }}"
                name: Seerr
            prowlarr:
              - url: http://prowlarr.default.svc.cluster.local
                access_url: https://prowlarr.hera.ac
                apikey: "{{ .PROWLARR_API_KEY }}"
                name: Prowlarr
            qui:
              - url: http://qui.default.svc.cluster.local
                access_url: https://qui.hera.ac
                apikey: "{{ .QUI_DASHBRR_API_KEY }}"
                name: Qui
            radarr:
              - url: http://radarr.default.svc.cluster.local
                access_url: https://radarr.hera.ac
                apikey: "{{ .RADARR_API_KEY }}"
                name: Radarr
            sabnzbd:
              - url: http://sabnzbd.default.svc.cluster.local
                access_url: https://sabnzbd.hera.ac
                apikey: "{{ .SABNZBD_API_KEY }}"
                name: SABnzbd
            sonarr:
              - url: http://sonarr.default.svc.cluster.local
                access_url: https://sonarr.hera.ac
                apikey: "{{ .SONARR_API_KEY }}"
                name: Sonarr
            general:
              - url: http://headscale.network.svc.cluster.local:8080/health
                access_url: https://hs.hera.ac
                name: Headscale
  dataFrom:
    - extract:
        key: autobrr
    - extract:
        key: bazarr
    - extract:
        key: jellyfin
    - extract:
        key: qui
    - extract:
        key: prowlarr
    - extract:
        key: radarr
    - extract:
        key: sabnzbd
    - extract:
        key: seerr
    - extract:
        key: sonarr
