---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dashbrr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: dashbrr-secret
    template:
      data:
        DASHBRR__DB_PASSWORD: "{{ .POSTGRES_DASHBRR_PASSWORD }}"
        OIDC_CLIENT_ID: "{{ .DASHBRR_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .DASHBRR_OIDC_CLIENT_SECRET }}"
        DASHBRR_AUTOBRR_API_KEY: "{{ .AUTOBRR_DASHBRR_API_KEY }}"
        DASHBRR_BAZARR_API_KEY: "{{ .BAZARR_API_KEY }}"
        DASHBRR_JELLYFIN_API_KEY: "{{ .JELLYFIN_API_TOKEN }}"
        DASHBRR_OVERSEERR_API_KEY: "{{ .SEERR_API_KEY }}"
        DASHBRR_PROWLARR_API_KEY: "{{ .PROWLARR_API_KEY }}"
        DASHBRR_QUI_API_KEY: "{{ .QUI_DASHBRR_API_KEY }}"
        DASHBRR_RADARR_API_KEY: "{{ .RADARR_API_KEY }}"
        DASHBRR_SABNZBD_API_KEY: "{{ .SABNZBD_API_KEY }}"
        DASHBRR_SONARR_API_KEY: "{{ .SONARR_API_KEY }}"
  dataFrom:
    - extract:
        key: postgresql
    - extract:
        key: dashbrr
    - extract:
        key: autobrr
    - extract:
        key: bazarr
    - extract:
        key: jellyfin
    - extract:
        key: prowlarr
    - extract:
        key: qui
    - extract:
        key: radarr
    - extract:
        key: sabnzbd
    - extract:
        key: seerr
    - extract:
        key: sonarr
