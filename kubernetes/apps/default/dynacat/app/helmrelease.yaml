---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dynacat
spec:
  chartRef:
    kind: OCIRepository
    name: dynacat
  interval: 1h
  values:
    controllers:
      dynacat:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: panonim/dynacat
              tag: 2.2.3
            env:
              TZ: Europe/London
              JELLYFIN_URL: https://jellyfin.hera.ac
              QBITTORRENT_URL: https://qbittorrent.hera.ac
            envFrom:
              - secretRef:
                  name: dynacat-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: &port 8080
                  initialDelaySeconds: 15
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 12
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - home.hera.ac
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config-file:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        globalMounts:
          - path: /app/config/dynacat.yml
            subPath: dynacat.yml
      assets:
        type: emptyDir
        globalMounts:
          - path: /app/assets
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
