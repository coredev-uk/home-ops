---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: frigate-oidc-secret
    template:
      data:
        client-secret: "{{ .ENVOY_EXTERNAL_OIDC_CLIENT_SECRET }}"
        client-id: "{{ .ENVOY_EXTERNAL_OIDC_CLIENT_ID }}"
  dataFrom:
    - extract:
        key: envoy
