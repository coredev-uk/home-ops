---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-assistant
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: home-assistant-secret
    template:
      data:
        HASS_AUTH_OIDC_CLIENT_ID: "{{ .HASS_AUTH_OIDC_CLIENT_ID }}"
        HASS_AUTH_OIDC_CLIENT_SECRET: "{{ .HASS_AUTH_OIDC_CLIENT_SECRET | default \"\" }}"
        HASS_ELEVATION: "{{ .HASS_ELEVATION }}"
        HASS_LATITUDE: "{{ .HASS_LATITUDE }}"
        HASS_LONGITUDE: '{{ index . "HASS_LONGITUDE" | default (index . "HASS_LONGTITUDE") }}'
        HASS_PIRATE_WEATHER_API_KEY: "{{ .HASS_PIRATE_WEATHER_API_KEY }}"
  dataFrom:
    - extract:
        key: home-assistant
