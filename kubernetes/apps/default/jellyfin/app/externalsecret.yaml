---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jellyfin-updater
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: jellyfin-updater-secret
    template:
      data:
        JF_API_KEY: "{{ .JELLYIFN_API_TOKEN }}"
  dataFrom:
    - extract:
        key: jellyfin
