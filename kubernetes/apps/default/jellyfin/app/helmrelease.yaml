---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    controllers:
      jellyfin:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.8@sha256:93227545077893cc9516f28b3adb733b67bc4691f41b6167428a2a0e3220b81c
            env:
              TZ: Europe/London
              JELLYFIN_PublishedServerUrl: https://jellyfin.hera.ac
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
              limits:
                memory: 16Gi
      updater:
        type: cronjob
        cronjob:
          schedule: 0 5 * * *
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 3600
        containers:
          app:
            image:
              repository: quay.io/curl/curl
              tag: 8.20.0
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                INFO=$(curl -s -H "X-Emby-Token: $API_KEY" http://jellyfin.default.svc.cluster.local:8096/System/Info)
                if echo "$INFO" | grep -q '"HasPendingRestart":true'; then
                  curl -X POST -H "X-Emby-Token: $API_KEY" http://jellyfin.default.svc.cluster.local:8096/System/Restart
                  echo "Jellyfin restarted"
                fi
        pod:
          restartPolicy: Never

    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: jellyfin
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups:
          - 988
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: jellyfin
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.20.247
          com.dashbrr.service.type: jellyfin
          com.dashbrr.service.url: http://jellyfin.default.svc.cluster.local:8096
          com.dashbrr.service.apikey: $${DASHBRR_JELLYFIN_API_KEY}
          com.dashbrr.service.name: Jellyfin
          com.dashbrr.service.enabled: "true"
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        hostnames:
          - "{{ .Release.Name }}.hera.ac"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          jellyfin:
            app:
              - path: /config
      media:
        type: nfs
        server: expanse.internal
        path: /var/nfs/shared/Media
        advancedMounts:
          jellyfin:
            app:
              - path: /media
                readOnly: true
      tmp:
        type: emptyDir
