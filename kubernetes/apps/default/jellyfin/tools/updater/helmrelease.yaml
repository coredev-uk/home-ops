---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-updater
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin-updater
  interval: 1h
  values:
    controllers:
      jellyfin-updater:
        type: cronjob
        cronjob:
          schedule: 0 5 * * *
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 3600
        containers:
          app:
            image:
              repository: quay.io/curl/curl
              tag: 8.18.0
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                INFO=$(curl -s -H "X-Emby-Token: ${API_KEY}" http://127.0.0.1:8096/System/Info)
                if echo "$INFO" | grep -q '"HasPendingRestart":true'; then
                  curl -X POST -H "X-Emby-Token: ${API_KEY}" http://127.0.0.1:8096/System/Restart
                  echo "Jellyfin restarted"
                fi
        pod:
          restartPolicy: Never
