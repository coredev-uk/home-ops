---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: kometa-secret
    template:
      data:
        KOMETA_MDBLISTAPIKEY: '{{ index . "MDBLIST_API_KEY" }}'
        KOMETA_PLEXTOKEN: '{{ index . "PLEX_TOKEN" }}'
        KOMETA_RADARRTOKEN: '{{ index . "RADARR_API_KEY" }}'
        KOMETA_SONARRTOKEN: '{{ index . "SONARR_API_KEY" }}'
        KOMETA_TAUTULLIAPIKEY: '{{ index . "TAUTULLI_API_KEY" }}'
        KOMETA_TMDBAPIKEY: '{{ index . "TMDB_API_KEY" }}'
  dataFrom:
    - extract:
        key: kometa
    - extract:
        key: radarr
    - extract:
        key: sonarr
    - extract:
        key: tautulli
