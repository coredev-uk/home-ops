---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notifiarr-metrics-proxy-config
data:
  Caddyfile: |
    :8080 {
      @metrics path /metrics

      handle @metrics {
        reverse_proxy http://notifiarr.default.svc.cluster.local:5454 {
          header_up X-Api-Key {env.NOTIFIARR_API_KEY}
        }
      }

      respond "Not Found" 404
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifiarr-metrics-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notifiarr-metrics-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notifiarr-metrics-proxy
    spec:
      containers:
        - name: caddy
          image: docker.io/library/caddy:2.8.4-alpine
          env:
            - name: NOTIFIARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notifiarr-secret
                  key: DN_API_KEY
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
            - name: tmp
              mountPath: /tmp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      volumes:
        - name: config
          configMap:
            name: notifiarr-metrics-proxy-config
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notifiarr-metrics-proxy
  labels:
    app.kubernetes.io/name: notifiarr-metrics-proxy
spec:
  selector:
    app.kubernetes.io/name: notifiarr-metrics-proxy
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
