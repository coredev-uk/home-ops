---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: outline-secret
    template:
      data:
        DATABASE_URL: "postgres://${APP}:{{ .POSTGRES_PASSWORD }}@postgresql.db.svc.cluster.local:5432/${APP}"
        REDIS_URL: "redis://:{{ .REDIS_PASSWORD }}@redis-master.db.svc.cluster.local:6379"
        SECRET_KEY: "{{ .OUTLINE_SECRET_KEY }}"
        UTILS_SECRET: "{{ .OUTLINE_UTILS_SECRET }}"
        OIDC_CLIENT_ID: "{{ .OUTLINE_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .OUTLINE_OIDC_CLIENT_SECRET }}"
        OIDC_LOGOUT_URI: "{{ .OUTLINE_OIDC_LOGOUT_URI }}"
  dataFrom:
    - extract:
        key: postgresql
    - extract:
        key: redis
    - extract:
        key: outline
