---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pocket-id
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: pocket-id-secret
    template:
      data:
        DB_CONNECTION_STRING: "postgres://pocket_id:{{ .POSTGRES_PASSWORD | urlquery }}@postgresql.db.svc.cluster.local:5432/pocket_id"
        ENCRYPTION_KEY: "{{ .POCKET_ID_ENCRYPTION_KEY }}"
        MAXMIND_LICENSE_KEY: "{{ .POCKET_ID_MAXMIND_LICENSE_KEY }}"
  dataFrom:
    - extract:
        key: postgresql
    - extract:
        key: pocket-id
