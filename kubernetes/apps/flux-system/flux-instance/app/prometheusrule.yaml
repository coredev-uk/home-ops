---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flux-instance-rules
  namespace: flux-system
spec:
  groups:
    - name: flux-instance.rules
      rules:
        - alert: FluxInstanceAbsent
          expr: |-
            absent(gotk_resource_info{customresource_kind="Kustomization", exported_namespace="flux-system", name="flux-system"})
          for: 5m
          annotations:
            summary: >-
              Flux instance metric is missing
          labels:
            severity: critical

        - alert: FluxInstanceNotReady
          expr: |-
            gotk_resource_info{customresource_kind="Kustomization", exported_namespace="flux-system", name="flux-system", ready!="True"} == 1
          for: 5m
          annotations:
            summary: >-
              Flux instance {{ $labels.name }} is not ready
          labels:
            severity: critical

        - alert: FluxControllerTargetDown
          expr: |-
            min_over_time(up{namespace="flux-system", pod=~"(source-controller|kustomize-controller|helm-controller|notification-controller)-.*"}[5m]) < 1
          for: 5m
          annotations:
            summary: >-
              Flux controller metrics target is down
          labels:
            severity: critical

        - alert: HelmReleaseReconciliationFailure
          expr: |-
            gotk_resource_info{customresource_kind="HelmRelease", ready!="True"} == 1
          for: 5m
          annotations:
            summary: >-
              HelmRelease {{ $labels.name }} in {{ $labels.exported_namespace }} is not ready
          labels:
            severity: critical

        - alert: KustomizationReconciliationFailure
          expr: |-
            gotk_resource_info{customresource_kind="Kustomization", ready!="True"} == 1
          for: 5m
          annotations:
            summary: >-
              Kustomization {{ $labels.name }} in {{ $labels.exported_namespace }} is not ready
          labels:
            severity: critical
