---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
spec:
  interval: 1h
  chart:
    spec:
      chart: pihole
      version: 2.35.0
      sourceRef:
        kind: HelmRepository
        name: pihole
        namespace: network
  values:
    replicaCount: 1
    admin:
      existingSecret: pihole-secret
      passwordKey: PIHOLE_PASSWORD
    DNS1: 1.1.1.1
    DNS2: 1.0.0.1
    serviceDns:
      type: LoadBalancer
      mixedService: true
      extraLabels:
        home-ops.io/lb-pool: pihole
      annotations:
        lbipam.cilium.io/ips: 192.168.20.21
        lbipam.cilium.io/sharing-key: pihole
    serviceWeb:
      type: LoadBalancer
      loadBalancerIP: 192.168.20.21
      extraLabels:
        home-ops.io/lb-pool: pihole
      annotations:
        lbipam.cilium.io/ips: 192.168.20.21
        lbipam.cilium.io/sharing-key: pihole
    serviceDhcp:
      enabled: false
    persistentVolumeClaim:
      enabled: true
      size: 2Gi
      storageClass: ceph-block
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
