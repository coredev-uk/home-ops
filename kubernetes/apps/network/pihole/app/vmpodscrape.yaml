---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/operator.victoriametrics.com/vmpodscrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: pihole
spec:
  namespaceSelector:
    matchNames:
      - network
  podMetricsEndpoints:
    - port: prometheus
      path: /metrics
      honorLabels: true
  selector:
    matchLabels:
      app: pihole
      release: pihole
