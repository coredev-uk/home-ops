---
alerting:
  pushover:
    application-token: ${BUDDY_PUSHOVER_TOKEN}
    default-alert:
      description: health-check failed
      failure-threshold: 3
      minimum-reminder-interval: 1h
      send-on-resolved: true
      success-threshold: 2
    priority: 1
    resolved-priority: 0
    title: Gatus
    user-key: ${BUDDY_PUSHOVER_USER_KEY}

endpoints:
  - name: Ping
    group: buddy
    url: 1.1.1.1
    interval: 1m
    dns:
      query-name: ${BUDDY_DDNS_HOSTNAME}
      query-type: A
    ui:
      hide-url: true
      hide-hostname: true
    conditions:
      - "len([BODY]) > 0"
    alerts:
      - type: pushover

  - name: Status Page
    group: buddy
    url: https://${BUDDY_STATUS_HOSTNAME}
    interval: 1m
    ui:
      hide-url: true
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: pushover

external-endpoints:
  - name: Heartbeat
    group: buddy
    token: ${BUDDY_HEARTBEAT_TOKEN}
    heartbeat:
      interval: 5m
    alerts:
      - type: pushover
