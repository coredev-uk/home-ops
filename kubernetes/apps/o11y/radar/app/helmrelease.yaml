---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
spec:
  interval: 1h
  chart:
    spec:
      chart: radar
      version: 1.6.1
      sourceRef:
        kind: HelmRepository
        name: radar
        namespace: o11y
  valuesFrom:
    - kind: Secret
      name: radar-secret
      valuesKey: client-id
      targetPath: auth.oidc.clientID
  values:
    auth:
      mode: oidc
      existingSecret: radar-secret
      existingSecretKey: auth-secret
      oidc:
        issuerURL: https://id.hera.ac
        existingSecret: radar-secret
        clientSecretKey: client-secret
        redirectURL: https://k8s.hera.ac/auth/callback
        postLogoutRedirectURL: https://k8s.hera.ac
        groupsClaim: groups
        scopes:
          - openid
          - profile
          - email
          - groups
    mcp:
      enabled: false
    persistence:
      enabled: false
    rbac:
      helm: false
      podExec: false
      portForward: false
      podLogs: true
      secrets: false
      traffic: true
      viewRBAC: false
    timeline:
      storage: memory
