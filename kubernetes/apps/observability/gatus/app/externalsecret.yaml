---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gatus
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gatus-secret
    template:
      data:
        STATUS_DDNS_HOSTNAME: "{{ .STATUS_DDNS_HOSTNAME }}"
        STATUS_HEARTBEAT_TOKEN: "{{ .STATUS_HEARTBEAT_TOKEN }}"
        STATUS_PUSHOVER_TOKEN: "{{ .STATUS_PUSHOVER_TOKEN }}"
        STATUS_PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        STATUS_PAGE_HOSTNAME: "{{ .STATUS_PAGE_HOSTNAME }}"
  dataFrom:
    - extract:
        key: gatus
    - extract:
        key: pushover
