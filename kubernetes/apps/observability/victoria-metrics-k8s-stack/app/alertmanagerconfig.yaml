---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmalertmanagerconfig_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    receiver: pushover
    repeat_interval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - alertname = InfoInhibitor
      - receiver: status-heartbeat
        group_interval: 2m
        group_wait: 0s
        repeat_interval: 2m30s
        matchers:
          - alertname = Watchdog
      - receiver: pushover
        matchers:
          - severity = critical
    group_by:
      - alertname
      - cluster
      - job
    group_interval: 5m
    group_wait: 1m

  inhibit_rules:
    - equal:
        - alertname
        - namespace
      source_matchers:
        - severity = critical
      target_matchers:
        - severity = warning

  receivers:
    - name: blackhole
    - name: status-heartbeat
      webhook_configs:
        - http_config:
            bearer_token_secret:
              name: alertmanager-secret
              key: STATUS_HEARTBEAT_TOKEN
          url_secret:
            name: alertmanager-secret
            key: STATUS_HEARTBEAT_URL
    - name: pushover
      pushover_configs:
        - html: true
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          send_resolved: true
          sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          expire: 86400s
          token:
            name: alertmanager-secret
            key: ALERTMANAGER_PUSHOVER_TOKEN
          user_key:
            name: alertmanager-secret
            key: PUSHOVER_USER_KEY
          url_title: View in Alertmanager
