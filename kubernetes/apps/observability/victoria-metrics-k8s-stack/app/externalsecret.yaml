---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-secret
    template:
      data:
        STATUS_HEARTBEAT_TOKEN: "{{ .STATUS_HEARTBEAT_TOKEN }}"
        STATUS_HEARTBEAT_URL: "https://{{ .STATUS_PAGE_HOSTNAME }}/api/v1/endpoints/status_heartbeat/external?success=true"
        ALERTMANAGER_PUSHOVER_TOKEN: "{{ .ALERTMANAGER_PUSHOVER_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
  dataFrom:
    - extract:
        key: alertmanager
    - extract:
        key: pushover
    - extract:
        key: gatus
