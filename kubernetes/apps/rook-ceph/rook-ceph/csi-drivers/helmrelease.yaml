---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
spec:
  interval: 1h
  chart:
    spec:
      chart: ceph-csi-drivers
      version: 1.0.1
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  values:
    operatorConfig:
      driverSpecDefaults:
        clusterName: rook-ceph
        controllerPlugin:
          deploymentStrategy:
            type: Recreate
          hostNetwork: true
          priorityClassName: system-cluster-critical
          replicas: 2
        imageSet:
          name: rook-csi-operator-image-set-configmap
        nodePlugin:
          kubeletDirPath: /var/lib/kubelet
          priorityClassName: system-node-critical
    drivers:
      rbd:
        name: rook-ceph.rbd.csi.ceph.com
        clusterName: rook-ceph
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          deploymentStrategy:
            type: Recreate
          hostNetwork: true
          priorityClassName: system-cluster-critical
          replicas: 2
        nodePlugin:
          priorityClassName: system-node-critical
        snapshotPolicy: volumeGroupSnapshot
      cephfs:
        name: rook-ceph.cephfs.csi.ceph.com
        clusterName: rook-ceph
        fsGroupPolicy: File
        imageSet:
          name: rook-csi-operator-image-set-configmap
        controllerPlugin:
          deploymentStrategy:
            type: Recreate
          hostNetwork: true
          priorityClassName: system-cluster-critical
          replicas: 2
        nodePlugin:
          priorityClassName: system-node-critical
        snapshotPolicy: volumeGroupSnapshot
      nfs:
        enabled: false
      nvmeof:
        enabled: false
