cluster:
  id: ref+op://kubernetes/talos/CLUSTER/ID
  secret: ref+op://kubernetes/talos/CLUSTER/SECRET
secrets:
  bootstraptoken: ref+op://kubernetes/talos/MACHINE/TOKEN
  secretboxencryptionsecret: ref+op://kubernetes/talos/CLUSTER/SECRET_BOX_ENCRYPTION_SECRET
trustdinfo:
  token: ref+op://kubernetes/talos/CLUSTER/TOKEN
certs:
  etcd:
    crt: ref+op://kubernetes/talos/CLUSTER/ETCD_CA_CRT
    key: ref+op://kubernetes/talos/CLUSTER/ETCD_CA_KEY
  k8s:
    crt: ref+op://kubernetes/talos/CLUSTER/CA_CRT
    key: ref+op://kubernetes/talos/CLUSTER/CA_KEY
  k8saggregator:
    crt: ref+op://kubernetes/talos/CLUSTER/AGGREGATOR_CA_CRT
    key: ref+op://kubernetes/talos/CLUSTER/AGGREGATOR_CA_KEY
  k8sserviceaccount:
    key: ref+op://kubernetes/talos/CLUSTER/SERVICE_ACCOUNT_KEY
  os:
    crt: ref+op://kubernetes/talos/MACHINE/CA_CRT
    key: ref+op://kubernetes/talos/MACHINE/CA_KEY
